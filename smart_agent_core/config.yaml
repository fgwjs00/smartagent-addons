name: SmartAgent AI Core
version: 0.0.139
slug: smart_agent_core
description: 'SmartAgent 网关、管理界面和 AI 推理核心，运行于家庭助理插件环境。

  '
url: https://github.com/fgwjs00/smartagent-addons
arch:
- amd64
startup: services
boot: auto
init: false
map:
- config:rw
- share:rw
homeassistant_api: true
ingress: true
ingress_port: 8234
panel_icon: mdi:robot
panel_title: SmartAgent
panel_admin: true
ports:
  8234/tcp: 8234
  18099/tcp: null
ports_description:
  8234/tcp: SmartAgent 网关 / 管理界面
  18099/tcp: SmartAgent 内部接口（供家庭助理集成访问）
options:
  ha_url: http://supervisor/core
  ha_token: ''
  auth_token: ''
  addon_port: 18099
  gateway_ui_port: 8234
  core_storage_mode: local_first
  data_sync_enabled: true
  license_key: ''
  deploy_name: ''
  llm_debug_log_requests: false
  llm_debug_log_full_prompt: false
  llm_debug_log_max_chars: 1000
schema:
  ha_url: str
  ha_token: password
  auth_token: password
  addon_port: int
  gateway_ui_port: int
  core_storage_mode: str
  data_sync_enabled: bool
  license_key: password
  deploy_name: str
  llm_debug_log_requests: bool
  llm_debug_log_full_prompt: bool
  llm_debug_log_max_chars: int
environment:
  SA_INTERNAL_PORT: '18099'
  SA_GATEWAY_UI_PORT: '8234'
  SA_UI_ROOT: /app/ui
  SA_SCREEN_ROOT: /app/screen
  SA_LOG_LEVEL: INFO
  SA_LOG_FILE: /data/logs/smart_agent.log
  SA_CORE_STORAGE_MODE: local_first
  SA_DATA_SYNC_ENABLED: 'true'
  SA_LICENSE_KEY: ''
  SA_DEPLOY_NAME: ''
  SA_LLM_DEBUG_LOG_REQUESTS: 'false'
  SA_LLM_DEBUG_LOG_FULL_PROMPT: 'false'
  SA_LLM_DEBUG_LOG_MAX_CHARS: '1000'
image: crpi-sijm6r9k7e2benib.cn-hangzhou.personal.cr.aliyuncs.com/fgwjs00/smart_agent
