  summary: Beta 0.0.172 完成 V3 设备目录、签名固件 OTA 和照明能力真值修复：灯具和开关执行后静默同步 Gateway 状态；空间归属显示
    `/rooms` 中文名称；固件上传只接受经 Ed25519、SHA256、产品/硬件/分区校验的 `.safw` 签名包；switch 实体可显式标记为照明，使灯带进入固定场景和
    Presence 候选，同时普通开关仍被排除；AI 决策抽屉去除同一命令的嵌套重复计数；巡检页面用明确空态替代“后端未回流”。G13 继续默认关闭且 hard-off
    为 true；MCP 暂缓。真实 HA 开关结果、Presence、OTA、HA-L、Frigate 和日志现场验收仍需部署后复验，不得视为生产绿灯。
