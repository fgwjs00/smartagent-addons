configuration:
  ha_url:
    name: 家庭助理服务地址
    description: 用于连接家庭助理服务的地址。部署在家庭助理系统内时通常保持默认 http://supervisor/core。
  ha_token:
    name: 家庭助理访问令牌
    description: SmartAgent 插件访问家庭助理服务时使用；留空时优先使用系统自动注入的凭证。
  auth_token:
    name: SmartAgent 内部访问令牌
    description: SmartAgent 网关和 HA 集成访问插件内部接口时使用；需要和集成侧配置保持一致。
  addon_port:
    name: 核心服务端口
    description: SmartAgent 核心服务对 HA 集成开放的内部接口端口；修改后需要同步更新集成侧端口配置并重启。
  gateway_ui_port:
    name: 管理界面端口
    description: SmartAgent 管理界面和中控屏的直接访问端口；Home Assistant 入口仍通过代理访问。
  ha_time_zone:
    name: 家庭助理时区
    description: 用于解析 Home Assistant 返回的本地时间戳；中国大陆环境建议保持 Asia/Shanghai。
  log_level:
    name: 插件日志级别
    description: 控制插件容器输出的详细程度。临时排查时可调为调试级别，平时建议保持信息级别。
  core_storage_mode:
    name: 核心存储模式
    description: 核心服务运行数据的存储策略。当前推荐保持本地优先，优先使用插件本地存储。
  llm_debug_log_requests:
    name: 记录大模型请求
    description: 开启后在日志中记录大模型请求摘要，用于排查上下文和决策问题。
  llm_debug_log_full_prompt:
    name: 记录完整提示词
    description: 开启后写入完整提示词，可能包含设备状态、空间信息和隐私上下文，仅建议临时排查使用。
  llm_debug_log_max_chars:
    name: 调试日志最大字符数
    description: 限制单条大模型调试日志输出长度；仅在开启请求日志时生效。
  frigate_admin_api_url:
    name: Frigate 管理 API 地址
    description: Frigate 认证管理端地址，必须使用 8971 端口；不要在地址中填写用户名、密码或其他凭据。
  frigate_admin_auth_mode:
    name: Frigate 管理认证模式
    description: SmartAgent 仅支持交互式登录；管理员凭据只用于当前配置事务，不会写入持久配置。
  frigate_admin_tls_verify:
    name: 验证 Frigate TLS 证书
    description: 连接 HTTPS 管理端时验证服务器证书；仅在受控的本地测试环境中关闭。
  presence_probabilistic_mode:
    name: 概率在场判定模式
    description: 控制新的概率式在场判定是否只记录分歧或参与实时决策；默认关闭，现场观察稳定后再调整。
  firmware_provider_base_url:
    name: 固件提供方基础地址
    description: 用于读取已签名传感器固件清单和下载固件。必须使用受信任的 HTTPS 地址；留空时不启用远程固件发布。
  firmware_trusted_ed25519_public_keys:
    name: 固件签名公钥
    description: 用于校验固件清单和固件包签名的 Ed25519 公钥列表。多个公钥以换行分隔；未配置时拒绝远程固件更新。
  data_sync_enabled:
    name: 兼容字段（不控制数据同步）
    description: 此旧字段不参与运行授权。请只在 V3 隐私页明确授权、停用或撤回数据同步。
  license_key:
    name: 授权码
    description: 企业版或商业授权码；留空时按免费版能力运行。
  deploy_name:
    name: 部署点名称
    description: 当前安装点的显示名称，用于区分不同家庭或测试环境。
  dev_source_root:
    name: 本地开发源码目录
    description: 仅用于局域网调试。留空时运行插件镜像内置代码；填写 /share/smartagent-addon-dev 后，插件重启时从 Samba 共享目录加载源码。
network:
  8234/tcp: SmartAgent 网关 / 管理界面
  18099/tcp: SmartAgent 内部接口（供家庭助理集成访问）
