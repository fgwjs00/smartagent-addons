configuration:
  ha_url:
    name: 家庭助理服务地址
    description: 用于连接家庭助理服务的地址。部署在家庭助理系统内时通常保持默认 http://supervisor/core。
  ha_token:
    name: 家庭助理访问令牌
    description: SmartAgent 插件访问家庭助理服务时使用；留空时优先使用系统自动注入的凭证。
  auth_token:
    name: SmartAgent 内部访问令牌
    description: SmartAgent 网关和 HA 集成访问插件内部接口时使用；需要和集成侧配置保持一致。
  addon_port:
    name: 核心服务端口
    description: SmartAgent 核心服务对 HA 集成开放的内部接口端口；修改后需要同步更新集成侧端口配置并重启。
  gateway_ui_port:
    name: 管理界面端口
    description: SmartAgent 管理界面和中控屏的直接访问端口；Home Assistant 入口仍通过代理访问。
  ha_time_zone:
    name: 家庭助理时区
    description: 用于解析 Home Assistant 返回的本地时间戳；中国大陆环境建议保持 Asia/Shanghai。
  log_level:
    name: 插件日志级别
    description: 控制插件容器输出的详细程度。临时排查时可调为调试级别，平时建议保持信息级别。
  core_storage_mode:
    name: 核心存储模式
    description: 核心服务运行数据的存储策略。当前推荐保持本地优先，优先使用插件本地存储。
  llm_debug_log_requests:
    name: 记录大模型请求
    description: 开启后在日志中记录大模型请求摘要，用于排查上下文和决策问题。
  llm_debug_log_full_prompt:
    name: 记录完整提示词
    description: 开启后写入完整提示词，可能包含设备状态、空间信息和隐私上下文，仅建议临时排查使用。
  llm_debug_log_max_chars:
    name: 调试日志最大字符数
    description: 限制单条大模型调试日志输出长度；仅在开启请求日志时生效。
  frigate_admin_api_url:
    name: Frigate 管理 API 地址
    description: Frigate 认证管理端地址，必须使用 8971 端口；不要在地址中填写用户名、密码或其他凭据。
  frigate_admin_auth_mode:
    name: Frigate 管理认证模式
    description: SmartAgent 仅支持交互式登录；管理员凭据只用于当前配置事务，不会写入持久配置。
  frigate_admin_tls_verify:
    name: 验证 Frigate TLS 证书
    description: 连接 HTTPS 管理端时验证服务器证书；仅在受控的本地测试环境中关闭。
  presence_probabilistic_mode:
    name: 概率在场判定模式
    description: 控制新的概率式在场判定是否只记录分歧或参与实时决策；默认关闭，现场观察稳定后再调整。
  firmware_provider_base_url:
    name: 固件提供方基础地址
    description: 设备维护模式从此地址下载已验签固件。只允许当前家庭 RFC1918 私网 IPv4 的 HTTP 地址；HTTP 仅负责局域网传输，固件真实性和完整性由 Ed25519 与 SHA256 保证。
  firmware_trusted_ed25519_public_keys:
    name: 固件签名公钥
    description: 用于校验 .safw 固件包签名的 Ed25519 公钥列表。多个公钥以换行分隔；未配置时拒绝任何固件入库和升级。
  presence_probabilistic_hard_off:
    name: 概率在场绝对关闭
    description: 默认开启。开启时无论运行配置或快照请求为何值，概率在场均强制关闭；修改后需重启插件生效。
  firmware_maintenance_wifi_ssid:
    name: 固件维护 Wi-Fi 名称
    description: 设备进入 service_ota 后连接的本地维护网络名称。仅用于当前家庭内网 OTA，不得填写公网热点或访客网络。
  firmware_maintenance_wifi_password:
    name: 固件维护 Wi-Fi 密码
    description: 本地维护网络密码。该字段按密码保存和注入，不在普通页面、日志或固件事务响应中回显。
  matter_protocol_enabled:
    name: 启用 Matter 固件管理
    description: 当前默认关闭。只有 Matter 分区、设备传输和现场验收全部通过后才能开启；协议切换由 Bootselect 完成，不通过 OTA 切换。
  data_sync_enabled:
    name: 兼容字段（不控制数据同步）
    description: 此旧字段不参与运行授权。请只在 V3 隐私页明确授权、停用或撤回数据同步。
  data_sync_consent_version:
    name: 训练数据同意版本
    description: 与家庭 owner 在 Cloud 端确认的训练数据同意版本保持一致；版本不一致时 Cloud 会拒绝上传，默认不上传任何数据。
  license_key:
    name: 授权码
    description: 企业版或商业授权码；留空时按免费版能力运行。
  deploy_name:
    name: 部署点名称
    description: 当前安装点的显示名称，用于区分不同家庭或测试环境。
  dev_source_root:
    name: 本地开发源码目录
    description: 仅用于局域网调试。留空时运行插件镜像内置代码；填写 /share/smartagent-addon-dev 后，插件重启时从 Samba 共享目录加载源码。
  remote_access_enabled:
    name: 启用远程访问
    description: 关闭时不会建立任何到云端的远程连接；配对和远程访问仅在明确开启后可用。
  remote_cloud_url:
    name: 远程访问云端地址
    description: SmartAgent 远程访问服务的 HTTPS 地址。只允许公开 HTTPS 地址，不要填写账号、密码或内网地址。
  remote_gateway_label:
    name: 远程网关显示名称
    description: 用于在已授权家庭账户中辨认本设备的公开显示名称；不要填写令牌或家庭隐私信息。
network:
  8234/tcp: SmartAgent 网关 / 管理界面
  18099/tcp: SmartAgent 内部接口（供家庭助理集成访问）
